name: Scheduled Python Script

on:
  schedule:
    # This example runs every 15 minutes. 
    # Adjust using cron syntax (e.g., '0 0 * * *' to run daily at midnight)
    - cron: '*/15 * * * *'
  
  # This adds a manual "Run workflow" button in the GitHub UI for testing
  workflow_dispatch: 

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
              pip install numpy pandas yfinance
          # If your script has extra libraries (e.g., requests), install them here:
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi


      - name: Run script
        run: python stock_analyzer.py --watchlist watchlist.txt
